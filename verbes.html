<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verbes">
<meta name="application-name" content="Verbes">
<meta name="theme-color" content="#3a7d44" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0c0f" media="(prefers-color-scheme: dark)">
<meta name="format-detection" content="telephone=no">
<link rel="icon" type="image/png" href="verbes_icon.png">
<link rel="apple-touch-icon" href="verbes_icon.png">
<link rel="manifest" href="manifest.json">
<title>Verbes</title>
<style>
:root {
  --bg: #0a0c0f;
  --bg-elev: #1e222a;
  --bg-soft: #2a2f38;
  --ink: #e6e8ec;
  --ink-soft: #8b919a;
  --ink-faint: #555b66;
  --line: #2a2f38;
  --primary: #3a7d44;
  --primary-deep: #2d6335;
  --primary-soft: rgba(58, 125, 68, 0.18);
  --primary-light: #6dd58c;
  --purple: #af52de;
  --red: #ff3b30;
  --green: #34c759;
  --green-dark: #1a5c28;
  --gold: #f0a500;
  --blue: #5b8aff;
}
@supports (color: color(display-p3 0 0 0)) {
  :root {
    --primary: color(display-p3 0.22 0.49 0.27);
    --primary-light: color(display-p3 0.43 0.84 0.55);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}
.app {
  max-width: 500px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.screen {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
}
.screen.active { display: flex; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  min-height: 48px;
  flex-shrink: 0;
}
.topbar h2 {
  position: absolute;
  left: 0; right: 0;
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  pointer-events: none;
}
.icon-btn {
  background: none; border: none;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; cursor: pointer;
  color: var(--primary-light);
  font-size: 22px;
  transition: background 0.15s;
  -webkit-appearance: none; padding: 0;
}
.icon-btn:active { background: var(--bg-soft); }
.icon-btn svg { width: 22px; height: 22px; stroke-width: 2; }

/* HOME */
.home {
  padding: 0 20px 20px;
  display: flex; flex-direction: column; align-items: center;
  flex: 1; justify-content: flex-start; gap: 0; overflow: hidden;
}
.home-head { text-align: center; margin: 4px 0 0; flex-shrink: 0; }
.home-head h1 {
  font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.home-head .subtitle {
  font-size: 13px; color: var(--ink-soft); margin-top: 0; letter-spacing: 0.02em;
}
.circle-nav-wrap {
  width: 100%; flex: 1 1 auto;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 0;
}
.circle-nav {
  position: relative;
  width: min(85vw, 360px); height: min(85vw, 360px);
}
.circle-nav svg { width: 100%; height: 100%; }
.circle-start {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 56.25%; height: 56.25%;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  color: #fff; border: none;
  font-family: inherit; font-size: 22px; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(58, 125, 68, 0.4);
  transition: transform 0.15s, box-shadow 0.2s;
}
.circle-start:active {
  transform: translate(-50%, -50%) scale(0.96);
  box-shadow: 0 2px 12px rgba(58, 125, 68, 0.3);
}

/* SESSION */
.session { flex: 1; display: flex; flex-direction: column; padding: 0 16px 16px; }
.session-progress { padding: 0 4px; margin-bottom: 4px; }
.session-progress-bar {
  height: 4px; background: var(--bg-soft); border-radius: 2px; overflow: hidden;
}
.session-progress-fill {
  height: 100%; background: var(--primary-light); border-radius: 2px;
  transition: width 0.3s;
}
.session-meta {
  display: flex; justify-content: space-between; padding: 0 4px;
  font-size: 12px; color: var(--ink-soft); margin-bottom: 12px;
}

/* CARD AREA - MULTIPLE CHOICE */
.card-area { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.mc-card {
  background: var(--bg-elev);
  border-radius: 16px; border: 1px solid var(--line);
  padding: 24px 20px 20px;
  display: flex; flex-direction: column; gap: 12px;
  transition: opacity 0.3s;
}
.mc-tag-row { display: flex; gap: 8px; }
.mc-tag {
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; background: var(--bg-soft); color: var(--ink-soft);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.mc-tag.fr-nl { background: var(--primary-soft); color: var(--primary-light); }
.mc-tag.nl-fr { background: rgba(175,82,222,0.18); color: var(--purple); }
.mc-tag.mix { background: rgba(91,138,255,0.18); color: var(--blue); }
.mc-tag.new { background: rgba(52,199,89,0.18); color: var(--green); }
.mc-tag.review { background: rgba(255,204,0,0.18); color: #ffcc00; }

.mc-question {
  text-align: center; padding: 8px 0;
}
.mc-verb {
  font-size: 28px; font-weight: 700; color: var(--ink);
  margin-bottom: 4px; line-height: 1.2;
}
.mc-verb .spelling-hl { color: var(--gold); }
.mc-tense {
  font-size: 14px; color: var(--ink-soft); font-style: italic;
}
.mc-example {
  font-size: 13px; color: var(--ink-faint); text-align: center;
  line-height: 1.4; padding: 0 8px;
}
.mc-example .nl { display: block; margin-top: 2px; }

/* ANSWER BUTTONS */
.mc-options {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 8px;
}
.mc-opt {
  background: var(--bg-soft);
  border: 2px solid var(--line);
  border-radius: 12px;
  padding: 14px 12px;
  font-family: inherit;
  font-size: 17px; font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  -webkit-appearance: none;
  text-align: center;
  min-height: 52px;
  display: flex; align-items: center; justify-content: center;
}
.mc-opt:active { transform: scale(0.97); }
.mc-opt.correct {
  background: rgba(52,199,89,0.2); border-color: var(--green); color: var(--green);
}
.mc-opt.wrong {
  background: rgba(255,59,48,0.2); border-color: var(--red); color: var(--red);
}
.mc-opt.reveal-correct {
  border-color: var(--green); color: var(--green);
}
.mc-opt.disabled { pointer-events: none; opacity: 0.5; }

/* FEEDBACK SECTION */
.mc-feedback {
  display: none;
  background: var(--bg-soft);
  border-radius: 12px;
  padding: 12px 16px;
  margin-top: 8px;
  animation: feedbackIn 0.3s ease;
}
@keyframes feedbackIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
.mc-feedback.show { display: block; }
.mc-feedback-title {
  font-size: 15px; font-weight: 700; margin-bottom: 4px;
}
.mc-feedback-title.ok { color: var(--green); }
.mc-feedback-title.fail { color: var(--red); }
.mc-feedback-rule {
  font-size: 12px; color: var(--ink-soft); line-height: 1.4;
}
.mc-next-btn {
  width: 100%;
  background: var(--primary);
  border: none; border-radius: 12px;
  padding: 14px;
  font-family: inherit; font-size: 16px; font-weight: 600;
  color: #fff; cursor: pointer;
  margin-top: 10px;
  transition: transform 0.1s;
}
.mc-next-btn:active { transform: scale(0.97); }

/* SUMMARY */
.summary {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
}
.summary-card {
  background: var(--bg-elev);
  border-radius: 20px; border: 1px solid var(--line);
  padding: 32px 24px;
  width: 100%; text-align: center;
}
.summary-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.summary-quote { font-size: 14px; color: var(--ink-soft); margin-bottom: 24px; line-height: 1.4; }
.stats-grid { display: flex; gap: 12px; justify-content: center; }
.stat-card {
  background: var(--bg-soft); border-radius: 12px; padding: 12px 16px;
  flex: 1; text-align: center;
}
.stat-num { font-size: 24px; font-weight: 700; }
.stat-lab { font-size: 11px; color: var(--ink-soft); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-card.good .stat-num { color: var(--green); }
.stat-card.bad .stat-num { color: var(--red); }
.stat-card.full .stat-num { color: var(--primary-light); }
.summary-actions { margin-top: 24px; width: 100%; }

/* BUTTONS */
.btn-primary {
  display: block; width: 100%;
  background: linear-gradient(135deg, var(--primary-light), var(--primary));
  border: none; border-radius: 14px;
  padding: 16px; font-family: inherit;
  font-size: 17px; font-weight: 600; color: #fff;
  cursor: pointer; transition: transform 0.1s;
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  display: block; width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--line); border-radius: 14px;
  padding: 14px; font-family: inherit;
  font-size: 15px; font-weight: 500;
  color: var(--primary-light);
  cursor: pointer; margin-top: 10px;
}
.btn-secondary:active { background: var(--bg-soft); }

/* CELEBRATION */
.celebration { text-align: center; }
.celebration h2 { font-size: 24px; margin: 16px 0 8px; }
.celebration p { font-size: 14px; color: var(--ink-soft); line-height: 1.5; }

/* SETTINGS */
.settings { padding: 0 16px; flex: 1; }
.settings-section { margin-bottom: 24px; }
.settings-section h3 { font-size: 13px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; padding: 0 4px; }
.settings-list { background: var(--bg-elev); border-radius: 12px; overflow: hidden; }
.settings-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; border: none; background: none;
  width: 100%; font-family: inherit; font-size: 15px;
  color: var(--ink); cursor: pointer; border-bottom: 1px solid var(--line);
  -webkit-appearance: none; text-align: left;
}
.settings-row:last-child { border-bottom: none; }
.settings-row:active { background: var(--bg-soft); }
.settings-row.danger { color: var(--red); }
.settings-row .arrow { color: var(--ink-faint); }
.settings-row .arrow svg { width: 18px; height: 18px; stroke-width: 2; }

/* TENSE INFO SCREEN */
.tense-info {
  padding: 20px 16px; flex: 1; overflow-y: auto;
}
.tense-info h2 {
  font-size: 22px; font-weight: 700; margin-bottom: 12px;
  color: var(--primary-light);
}
.tense-info .usage {
  font-size: 14px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 16px;
}
.tense-info .rule-box {
  background: var(--bg-elev); border-radius: 12px; padding: 16px;
  border-left: 3px solid var(--primary-light); margin-bottom: 16px;
}
.tense-info .rule-box .rule-title {
  font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
}
.tense-info .rule-box .rule-text {
  font-size: 15px; color: var(--ink); font-weight: 700; margin-bottom: 4px;
}
.tense-info .rule-box .rule-detail {
  font-size: 14px; color: var(--ink-soft); font-weight: 400; margin-bottom: 8px;
}
.tense-info .conj-table {
  width: 100%; border-collapse: collapse; margin-top: 10px;
}
.tense-info .conj-table tr { border-bottom: 1px solid var(--line); }
.tense-info .conj-table tr:last-child { border-bottom: none; }
.tense-info .conj-table td { padding: 6px 0; font-size: 15px; }
.tense-info .conj-person { color: var(--ink-soft); width: 45%; }
.tense-info .conj-ending { color: var(--primary-light); font-weight: 600; }
.tense-info .rule-note {
  font-size: 13px; color: var(--ink-faint); margin-top: 8px; font-style: italic;
}
.tense-info .example-box {
  background: var(--bg-soft); border-radius: 12px; padding: 14px 16px;
}
.tense-info .example-fr {
  font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px;
}
.tense-info .example-nl {
  font-size: 13px; color: var(--ink-soft); font-style: italic;
}

/* BLOCK TEST */
.block-test-intro {
  padding: 24px 20px; flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
}
.block-test-intro h2 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
.block-test-intro p { font-size: 14px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 24px; max-width: 300px; }

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-elev); color: var(--ink);
  padding: 10px 20px; border-radius: 10px;
  font-size: 14px; font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* CONFETTI */
.confetti-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 9999;
}

/* PHASE PROGRESS BARS */
.phase-dir-row { display: flex; align-items: center; gap: 8px; }
.phase-dir-label { font-size: 12px; color: var(--ink-soft); width: 50px; text-align: right; }
.phase-bar { height: 6px; background: var(--bg-soft); border-radius: 3px; overflow: hidden; position: relative; }
.phase-bar-fill { height: 100%; border-radius: 3px; position: absolute; top: 0; left: 0; transition: width 0.5s; }
.phase-bar-fill.streak { z-index: 2; }
.phase-bar-fill.streak.fr-nl { background: var(--primary-light); }
.phase-bar-fill.streak.nl-fr { background: var(--purple); }
.phase-bar-fill.interval { background: var(--gold); z-index: 1; }
.phase-dir-count { font-size: 12px; color: var(--ink-faint); width: 40px; }

@media (max-height: 650px) {
  .mc-verb { font-size: 24px; }
  .mc-opt { padding: 10px 8px; font-size: 15px; min-height: 44px; }
  .mc-card { padding: 16px 14px 14px; gap: 8px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="topbar">
      <span></span>
      <h2></h2>
      <button class="icon-btn" data-action="show-tense-info" aria-label="Grammatica">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      </button>
    </div>
    <div class="home">
      <div class="home-head">
        <h1>Verbes</h1>
        <div class="subtitle">Werkwoorden Frans</div>
      </div>
      <div class="circle-nav-wrap">
        <div class="circle-nav" id="circle-nav">
          <svg viewBox="0 0 320 320" id="circle-svg"></svg>
          <button class="circle-start" id="start-btn" data-action="start">Start</button>
        </div>
      </div>
      <div style="position:fixed;bottom:20px;right:20px">
        <button class="icon-btn" data-action="open-settings" aria-label="Instellingen" style="opacity:0.5">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- SESSION -->
  <div id="screen-session" class="screen">
    <div class="topbar">
      <button class="icon-btn" data-action="abort-session" aria-label="Stop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <h2 id="session-title">Sessie</h2>
      <button class="icon-btn" id="tense-info-btn" data-action="show-tense-info" aria-label="Grammatica">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      </button>
    </div>
    <div class="session">
      <div class="session-progress">
        <div class="session-progress-bar"><div class="session-progress-fill" id="sess-fill"></div></div>
      </div>
      <div class="session-meta">
        <span id="sess-counter">1 / 25</span>
        <span id="sess-info"></span>
      </div>
      <div class="card-area">
        <div class="mc-card" id="mc-card">
          <div class="mc-tag-row">
            <span class="mc-tag" id="mc-dir-tag">FR→NL</span>
            <span class="mc-tag" id="mc-type-tag">Nieuw</span>
          </div>
          <div class="mc-question">
            <div class="mc-verb" id="mc-verb"></div>
            <div class="mc-tense" id="mc-tense"></div>
          </div>
          <div class="mc-example" id="mc-example"></div>
          <div class="mc-options" id="mc-options"></div>
          <div class="mc-feedback" id="mc-feedback">
            <div class="mc-feedback-title" id="mc-fb-title"></div>
            <div class="mc-feedback-rule" id="mc-fb-rule"></div>
          </div>
          <button class="mc-next-btn" id="mc-next" style="display:none" data-action="next-card">Volgende</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BLOCK TEST INTRO -->
  <div id="screen-block-test" class="screen">
    <div class="topbar">
      <button class="icon-btn" data-action="back-home" aria-label="Terug">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
      <h2>Bloktoets</h2>
      <span style="width:40px"></span>
    </div>
    <div class="block-test-intro">
      <h2 id="bt-title">Bloktoets</h2>
      <p id="bt-text">12 kaarten in mix-modus. Je hebt 80% nodig om het volgende blok te ontgrendelen.</p>
      <button class="btn-primary" data-action="start-block-test">Start toets</button>
      <button class="btn-secondary" data-action="back-home">Terug</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="screen-summary" class="screen">
    <div class="topbar">
      <span style="width:40px"></span>
      <h2>Sessie afgerond</h2>
      <span style="width:40px"></span>
    </div>
    <div class="summary">
      <div class="summary-card">
        <div class="summary-title" id="sum-title">Bravo!</div>
        <div class="summary-quote" id="sum-quote"></div>
        <div class="stats-grid">

const TOTAL_BLOCKS = BLOCKS.length;
const VERB_MAP = Object.fromEntries(VERBS.map(v => [v.inf, v]));

// ============================================================
//   HELPER: Build flat card list for a sub-block
// ============================================================
function getVerbByInf(inf) {
  return VERB_MAP[inf];
}

function getSubBlockCards(blockIdx, subIdx) {
  const block = BLOCKS[blockIdx];
  const sub = block.subs[subIdx];
  const tenses = sub.tenses || block.tenses || ['present'];
  const cards = [];
  for (const verbInf of sub.verbs) {
    const verb = getVerbByInf(verbInf);
    if (!verb) continue;
    for (const tense of tenses) {
      if (tense === 'futProche' || tense === 'partPresent') {
        cards.push({ verb, tense, personIdx: -1 });
        continue;
      }
      if (tense === 'imperatif') {
        if (!verb.imp) continue;
        for (let p = 0; p < 3; p++) {
          cards.push({ verb, tense, personIdx: p });
        }
        continue;
      }
      const forms = verb.conj[tense];
      if (!forms) continue;
      for (let p = 0; p < 6; p++) {
        if (forms[p] === null) continue;
        cards.push({ verb, tense, personIdx: p });
      }
    }
  }
  return cards;
}

function cardKey(verb, tense, personIdx) {
  return `${verb.inf}|${tense}|${personIdx}`;
}

// ============================================================
//   PASSÉ COMPOSÉ & FUTUR PROCHE HELPERS
// ============================================================
function getPasseComposeForm(verb, personIdx) {
  const auxVerb = VERB_MAP[verb.aux === 'être' ? 'être' : 'avoir'];
  return auxVerb.conj.present[personIdx] + ' ' + verb.pp;
}

function getFutProcheForm(verb, personIdx) {
  return VERB_MAP['aller'].conj.present[personIdx] + ' ' + verb.inf;
}

function getConjugation(verb, tense, personIdx) {
  if (tense === 'passeCompose') return getPasseComposeForm(verb, personIdx);
  if (tense === 'futProche') return getFutProcheForm(verb, personIdx >= 0 ? personIdx : 0);
  if (tense === 'partPresent') return verb.ppres || '';
  if (tense === 'imperatif') {
    if (!verb.imp) return '';
    return verb.imp[personIdx] || '';
  }
  const forms = verb.conj[tense];
  if (!forms || forms[personIdx] === null) return '';
  return forms[personIdx];
}

function getPersonLabel(tense, personIdx) {
  if (tense === 'imperatif') return ['tu','nous','vous'][personIdx] || '';
  if (tense === 'partPresent' || tense === 'futProche') return '';
  return PERSONS[personIdx] || '';
}

function getTenseLabel(tense) {
  return TENSES[tense] ? TENSES[tense].label : tense;
}

// ============================================================
//   STATE MANAGEMENT
// ============================================================
let state = null;

function defaultState() {
  return {
    progress: {
      currentBlock: 0,
      currentSub: 0,
      blockTestPassed: new Array(TOTAL_BLOCKS).fill(false),
    },
    cards: {},
    sessionStats: { recentRatios: [] },
    lastSessionEnded: 0,
    tenseInfoSeen: {},
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      const def = defaultState();
      state = { ...def, ...parsed };
      state.progress = { ...def.progress, ...(parsed.progress || {}) };
      state.cards = parsed.cards || {};
      state.sessionStats = parsed.sessionStats || def.sessionStats;
      if (!state.progress.blockTestPassed) state.progress.blockTestPassed = def.progress.blockTestPassed;
      return;
    }
  } catch (e) { console.warn('load state failed', e); }
  state = defaultState();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { toast('Kon niet opslaan: ' + e.message); }
}

function getCardData(key) {
  if (!state.cards[key]) {
    state.cards[key] = {
      ease: 2.5, interval: 0, due: 0, reps: 0, lapses: 0, streak: 0,
      lastSeen: 0, phaseProgress: 0
    };
  }
  return state.cards[key];
}

function exportState() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'verbes_backup_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup gedownload');
}

function importState(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.cards) throw new Error('Ongeldig backup-bestand');
      state = { ...defaultState(), ...parsed };
      saveState(); renderHome(); showScreen('screen-home');
      toast('Backup hersteld!');
    } catch (err) { toast('Ongeldig bestand: ' + err.message); }
  };
  reader.readAsText(file);
}

// ============================================================
//   SM-2 SRS ENGINE
// ============================================================
const DAY = 24 * 60 * 60 * 1000;

function applyGrade(key, grade, isReview) {
  const c = getCardData(key);
  c.lastSeen = Date.now();
  if (grade === 0) {
    c.lapses += 1; c.reps = 0; c.interval = 0; c.streak = 0;
    c.ease = Math.max(1.3, c.ease - 0.2);
    c.due = Date.now() + 60000;
    if (isReview) {
      c.phaseProgress = Math.min(c.phaseProgress || 0, 4);
    } else {
      c.phaseProgress = 0;
    }
  } else {
    c.reps += 1; c.streak = (c.streak || 0) + 1;
    if (grade === 1) {
      if (c.reps === 1) c.interval = 1;
      else c.interval = Math.max(1, Math.round(c.interval * 1.2));
      c.ease = Math.max(1.3, c.ease - 0.15);
    } else {
      if (c.reps === 1) c.interval = 1;
      else if (c.reps === 2) c.interval = 3;
      else c.interval = Math.round(c.interval * c.ease);
    }
    c.due = Date.now() + c.interval * DAY;
    c.phaseProgress = Math.min((c.phaseProgress || 0) + 1, PHASES_PER_SUB);
  }
  saveState();
}

function isDue(key) {
  const c = state.cards[key];
  if (!c || c.reps === 0) return false;
  return c.due <= Date.now();
}

function isCardNew(key) {
  const c = state.cards[key];
  return !c || c.reps === 0;
}

function isIntervalMastered(key) {
  const c = state.cards[key];
  return c && c.interval >= MASTERY_INTERVAL_DAYS;
}

// ============================================================
//   BLOCK & PHASE MANAGEMENT
// ============================================================
function getCurrentSubBlockCards() {
  return getSubBlockCards(state.progress.currentBlock, state.progress.currentSub);
}

function getPhaseDirection(phase) {
  if (phase < 2) return 'fr-nl';
  if (phase < 4) return 'nl-fr';
  return 'mix';
}

function isSubBlockComplete(blockIdx, subIdx) {
  const cards = getSubBlockCards(blockIdx, subIdx);
  return cards.length > 0 && cards.every(c => {
    const cd = state.cards[cardKey(c.verb, c.tense, c.personIdx)];
    return cd && cd.phaseProgress >= PHASES_PER_SUB;
  });
}

function isBlockAllSubsComplete(blockIdx) {
  const block = BLOCKS[blockIdx];
  return block.subs.every((_, si) => isSubBlockComplete(blockIdx, si));
}

function getSubBlockStatus(blockIdx, subIdx) {
  const cards = getSubBlockCards(blockIdx, subIdx);
  if (cards.length === 0) return 'empty';
  const cur = state.progress.currentBlock;
  const curSub = state.progress.currentSub;
  if (blockIdx > cur || (blockIdx === cur && subIdx > curSub)) return 'locked';
  const allDone = cards.every(c => {
    const cd = state.cards[cardKey(c.verb, c.tense, c.personIdx)];
    return cd && cd.phaseProgress >= PHASES_PER_SUB;
  });
  if (allDone) {
    const allMastered = cards.every(c => isIntervalMastered(cardKey(c.verb, c.tense, c.personIdx)));
    if (allMastered) return 'gold';
    return 'mix';
  }
  const minPhase = Math.min(...cards.map(c => {
    const cd = state.cards[cardKey(c.verb, c.tense, c.personIdx)];
    return cd ? cd.phaseProgress : 0;
  }));
  if (minPhase >= 4) return 'nl-fr';
  if (minPhase >= 2) return 'fr-nl';
  return 'empty';
}

function getBlockStatus(blockIdx) {
  const block = BLOCKS[blockIdx];
  const cur = state.progress.currentBlock;
  if (blockIdx > cur) return 'locked';
  const allSubsDone = isBlockAllSubsComplete(blockIdx);
  if (allSubsDone && state.progress.blockTestPassed[blockIdx]) {
    const allCards = block.subs.flatMap((_, si) => getSubBlockCards(blockIdx, si));
    const allMastered = allCards.every(c => isIntervalMastered(cardKey(c.verb, c.tense, c.personIdx)));
    if (allMastered) return 'gold';
    return 'mix';
  }
  if (allSubsDone) return 'nl-fr';
  const anySeen = block.subs.some((_, si) => {
    const cards = getSubBlockCards(blockIdx, si);
    return cards.some(c => {
      const cd = state.cards[cardKey(c.verb, c.tense, c.personIdx)];
      return cd && cd.reps > 0;
    });
  });
  if (anySeen) return 'fr-nl';
  return 'empty';
}

function advanceIfComplete() {
  const bi = state.progress.currentBlock;
  const si = state.progress.currentSub;
  if (bi >= TOTAL_BLOCKS) return null;
  const block = BLOCKS[bi];

  if (isSubBlockComplete(bi, si)) {
    if (si < block.subs.length - 1) {
      state.progress.currentSub = si + 1;
      saveState();
      return { subComplete: true, blockIdx: bi, subIdx: si };
    }
    if (isBlockAllSubsComplete(bi)) {
      if (!state.progress.blockTestPassed[bi]) {
        return { needsBlockTest: true, blockIdx: bi };
      }
      if (bi < TOTAL_BLOCKS - 1) {
        state.progress.currentBlock = bi + 1;
        state.progress.currentSub = 0;
        saveState();
        return { blockComplete: true, blockIdx: bi };
      }
      return { allDone: true };
    }
  }
  return null;
}

// ============================================================
//   SESSION BUILDER
// ============================================================
function pickSessionCards() {
  const bi = state.progress.currentBlock;
  const si = state.progress.currentSub;
  const now = Date.now();

  const ratios = (state.sessionStats.recentRatios || []).slice(-5);
  let avgGood = 0.7;
  if (ratios.length > 0) avgGood = ratios.reduce((a, b) => a + b, 0) / ratios.length;
  let newRatio = avgGood > 0.8 ? 0.7 : avgGood < 0.5 ? 0.4 : 0.6;
  const targetNew = Math.round(SESSION_LENGTH * newRatio);

  const subCards = getSubBlockCards(bi, si);
  const newCards = [];
  for (const c of subCards) {
    const key = cardKey(c.verb, c.tense, c.personIdx);
    const cd = getCardData(key);
    if (cd.phaseProgress < PHASES_PER_SUB) {
      const cardDir = getPhaseDirection(cd.phaseProgress || 0);
      newCards.push({ ...c, key, dir: cardDir, type: 'new' });
    }
  }

  const reviewCards = [];
  for (let b = 0; b <= bi; b++) {
    const block = BLOCKS[b];
    const maxSub = (b < bi) ? block.subs.length : si + 1;
    for (let s = 0; s < maxSub; s++) {
      if (b === bi && s === si) continue;
      for (const c of getSubBlockCards(b, s)) {
        const key = cardKey(c.verb, c.tense, c.personIdx);
        const cd = state.cards[key];
        if (cd && cd.reps > 0 && cd.due <= now) {
          reviewCards.push({ ...c, key, dir: Math.random() < 0.5 ? 'fr-nl' : 'nl-fr', type: 'review' });
        }
      }
    }
  }
  reviewCards.sort((a, b) => (state.cards[a.key]?.due || 0) - (state.cards[b.key]?.due || 0));

  let session = [];
  const picked = new Set();
  for (const c of newCards.slice(0, targetNew)) {
    if (!picked.has(c.key)) { session.push(c); picked.add(c.key); }
  }
  for (const c of reviewCards) {
    if (session.length >= SESSION_LENGTH) break;
    if (!picked.has(c.key)) { session.push(c); picked.add(c.key); }
  }
  for (const c of newCards) {
    if (session.length >= SESSION_LENGTH) break;
    if (!picked.has(c.key)) { session.push(c); picked.add(c.key); }
  }

  if (session.length === 0) {
    for (const c of subCards) {
      const key = cardKey(c.verb, c.tense, c.personIdx);
      const cd = getCardData(key);
      const fallbackDir = getPhaseDirection(cd.phaseProgress || 0);
      session.push({ ...c, key, dir: fallbackDir, type: 'review' });
      if (session.length >= SESSION_LENGTH) break;
    }
  }

  shuffle(session);
  return session.slice(0, SESSION_LENGTH);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ============================================================
//   DISTRACTOR GENERATION
// ============================================================
function getAlsoCorrectPersons(verb, tense, personIdx) {
  const targetForm = getConjugation(verb, tense, personIdx);
  const also = [];
  for (let p = 0; p < 6; p++) {
    if (p === personIdx) continue;
    if (getConjugation(verb, tense, p) === targetForm) also.push(p);
  }
  return also;
}

function generateDistractors(card, correctAnswer, dir) {
  const distractors = new Set();
  const verb = card.verb;
  const tense = card.tense;

  if (dir === 'fr-nl') {
    const correctForm = getConjugation(verb, tense, card.personIdx);
    const sameFormPersons = new Set([card.personIdx, ...getAlsoCorrectPersons(verb, tense, card.personIdx)]);
    const allTenses = Object.keys(verb.conj);
    for (let p = 0; p < 6; p++) {
      if (sameFormPersons.has(p)) continue;
      const label = PERSONS[p] + ' (' + getTenseLabel(tense) + ')';
      distractors.add(label);
    }
    for (const t of allTenses) {
      if (t === tense) continue;
      const label = getPersonLabel(t, card.personIdx) + ' (' + getTenseLabel(t) + ')';
      if (label !== correctAnswer) distractors.add(label);
    }
  } else {
    const correctForm = getConjugation(verb, tense, card.personIdx);
    const forms = verb.conj[tense];
    if (forms) {
      for (let p = 0; p < 6; p++) {
        if (p === card.personIdx) continue;
        const f = getConjugation(verb, tense, p);
        if (f && f !== correctForm) distractors.add(f);
      }
    }
    const otherTenses = Object.keys(verb.conj).filter(t => t !== tense);
    for (const t of otherTenses) {
      const f = getConjugation(verb, t, card.personIdx);
      if (f && f !== correctForm) distractors.add(f);
    }
  }

  const arr = Array.from(distractors);
  shuffle(arr);
  return arr.slice(0, 3);
}

// ============================================================
//   UI RENDERING
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function renderHome() {
  const cx = 160, cy = 160;

  function sectorPath(cx, cy, rIn, rOut, startAngle, endAngle) {
    const s = startAngle - Math.PI / 2;
    const e = endAngle - Math.PI / 2;
    const large = (endAngle - startAngle) > Math.PI ? 1 : 0;
    return [
      `M ${cx + rOut * Math.cos(s)} ${cy + rOut * Math.sin(s)}`,
      `A ${rOut} ${rOut} 0 ${large} 1 ${cx + rOut * Math.cos(e)} ${cy + rOut * Math.sin(e)}`,
      `L ${cx + rIn * Math.cos(e)} ${cy + rIn * Math.sin(e)}`,
      `A ${rIn} ${rIn} 0 ${large} 0 ${cx + rIn * Math.cos(s)} ${cy + rIn * Math.sin(s)}`,
      'Z'
    ].join(' ');
  }

  const COL = {
    locked: '#1a1e24', empty: '#2a2f38',
    'fr-nl': '#3a7d44', 'nl-fr': '#3a7d44',
    mix: '#1a5c28', gold: 'url(#goldGrad)',
    bg: '#0d1117',
  };

  const gap = 0.03;

  let svg = `<defs><linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c8940a"/><stop offset="30%" stop-color="#e8b910"/>
    <stop offset="60%" stop-color="#f5d442"/><stop offset="100%" stop-color="#d4a017"/>
  </linearGradient></defs>`;

  function drawRing(count, rIn, rOut, statusFn) {
    const angle = (2 * Math.PI) / count;
    for (let i = 0; i < count; i++) {
      const startA = i * angle + gap / 2;
      const endA = (i + 1) * angle - gap / 2;
      const status = statusFn(i);
      const d = sectorPath(cx, cy, rIn, rOut, startA, endA);
      let fill, stroke = 'none', sw = 0, opacity = 1;
      switch (status) {
        case 'locked': fill = COL.locked; opacity = 0.5; break;
        case 'empty': fill = COL.empty; break;
        case 'fr-nl': fill = COL.bg; stroke = COL['fr-nl']; sw = 2; break;
        case 'nl-fr': fill = COL['nl-fr']; break;
        case 'mix': fill = COL.mix; break;
        case 'gold': fill = COL.gold; break;
        default: fill = COL.empty;
      }
      svg += `<path d="${d}" fill="${fill}" opacity="${opacity}"`;
      if (sw > 0) svg += ` stroke="${stroke}" stroke-width="${sw}"`;
      svg += '/>';
    }
  }

  drawRing(TOTAL_BLOCKS, 130, 155, i => getBlockStatus(i));

  const bi = state.progress.currentBlock;
  if (bi < TOTAL_BLOCKS) {
    drawRing(BLOCKS[bi].subs.length, 96, 124, i => getSubBlockStatus(bi, i));
  }

  document.getElementById('circle-svg').innerHTML = svg;

  const startBtn = document.getElementById('start-btn');
  if (bi >= TOTAL_BLOCKS) {
    startBtn.disabled = true;
    startBtn.textContent = 'Klaar!';
  } else {
    startBtn.disabled = false;
    startBtn.textContent = 'Start';
  }
}

// ============================================================
//   SESSION RUNTIME
// ============================================================
let session = null;

function startSession(isBlockTest) {
  let cards;
  if (isBlockTest) {
    const bi = state.progress.currentBlock;
    const block = BLOCKS[bi];
    const allCards = block.subs.flatMap((_, si) => getSubBlockCards(bi, si));
    shuffle(allCards);
    cards = allCards.slice(0, BLOCK_TEST_LENGTH).map(c => ({
      ...c, key: cardKey(c.verb, c.tense, c.personIdx),
      dir: Math.random() < 0.5 ? 'fr-nl' : 'nl-fr', type: 'test'
    }));
  } else {
    cards = pickSessionCards();
  }

  if (cards.length === 0) { toast('Geen kaarten beschikbaar.'); return; }

  // Show tense info for new block if not seen
  const bi = state.progress.currentBlock;
  if (bi < TOTAL_BLOCKS && !isBlockTest) {
    const block = BLOCKS[bi];
    const mainTense = (block.tenses || ['present'])[0];
    if (mainTense !== 'present' && !state.tenseInfoSeen[bi]) {
      state.tenseInfoSeen[bi] = true;
      saveState();
      showTenseInfoForBlock(bi);
      setTimeout(() => {
        actuallyStartSession(cards, isBlockTest);
      }, 0);
      return;
    }
  }

  actuallyStartSession(cards, isBlockTest);
}

function actuallyStartSession(cards, isBlockTest) {
  session = {
    cards, idx: 0, good: 0, bad: 0,
    isBlockTest: !!isBlockTest,
    answered: false,
  };
  const bi = state.progress.currentBlock;
  const block = BLOCKS[bi];
  const sub = block ? block.subs[state.progress.currentSub] : null;
  document.getElementById('session-title').textContent =
    isBlockTest ? `Bloktoets: ${block?.name || ''}` :
    `${block?.name || ''} · ${sub?.name || ''}`;
  showScreen('screen-session');
  renderMCCard();
}

function renderMCCard() {
  if (!session || session.idx >= session.cards.length) { finishSession(); return; }
  const c = session.cards[session.idx];
  session.answered = false;

  const cd = getCardData(c.key);
  let dir = c.dir || getPhaseDirection(cd.phaseProgress || 0);
  if (dir === 'mix') dir = ['fr-nl', 'nl-fr', 'nl-fr'][Math.floor(Math.random() * 3)];

  const correctForm = getConjugation(c.verb, c.tense, c.personIdx);
  const personLabel = getPersonLabel(c.tense, c.personIdx);
  const tenseLabel = getTenseLabel(c.tense);

  // Direction tag
  const dirTag = document.getElementById('mc-dir-tag');
  dirTag.textContent = dir === 'fr-nl' ? 'FR→NL' : 'NL→FR';
  dirTag.className = 'mc-tag ' + (dir === 'fr-nl' ? 'fr-nl' : 'nl-fr');

  // Type tag
  const typeTag = document.getElementById('mc-type-tag');
  typeTag.textContent = c.type === 'new' ? 'Nieuw' : c.type === 'test' ? 'Toets' : 'Herhaling';
  typeTag.className = 'mc-tag ' + (c.type === 'new' ? 'new' : 'review');

  // Question
  const verbEl = document.getElementById('mc-verb');
  const tenseEl = document.getElementById('mc-tense');

  let correctAnswer;
  let options;

  let alsoCorrectSet = new Set();

  if (dir === 'fr-nl') {
    verbEl.innerHTML = highlightSpelling(c.verb, c.tense, c.personIdx, correctForm);
    tenseEl.textContent = '';
    correctAnswer = personLabel + ' (' + tenseLabel + ')';
    const alsoPers = getAlsoCorrectPersons(c.verb, c.tense, c.personIdx);
    for (const p of alsoPers) {
      alsoCorrectSet.add(PERSONS[p] + ' (' + tenseLabel + ')');
    }
    const distractors = generateDistractors(c, correctAnswer, 'fr-nl');
    options = [correctAnswer, ...distractors];
  } else {
    verbEl.textContent = c.verb.inf + ' — ' + personLabel;
    tenseEl.textContent = '(' + tenseLabel + ')';
    correctAnswer = correctForm;
    const distractors = generateDistractors(c, correctAnswer, 'nl-fr');
    options = [correctAnswer, ...distractors];
  }

  // Example
  const exEl = document.getElementById('mc-example');
  const exData = c.verb.examples && c.verb.examples[c.tense];
  if (exData) {
    exEl.innerHTML = exData.fr + '<span class="nl">' + exData.nl + '</span>';
  } else {
    const firstEx = c.verb.examples && Object.values(c.verb.examples)[0];
    exEl.innerHTML = firstEx ? firstEx.fr + '<span class="nl">' + firstEx.nl + '</span>' : '';
  }

  // Shuffle options
  shuffle(options);

  // Render option buttons
  const optionsEl = document.getElementById('mc-options');
  optionsEl.innerHTML = '';
  for (const opt of options) {
    const btn = document.createElement('button');
    btn.className = 'mc-opt';
    btn.textContent = opt;
    btn.dataset.answer = opt;
    btn.dataset.correct = (opt === correctAnswer || alsoCorrectSet.has(opt)) ? '1' : '0';
    btn.addEventListener('click', () => handleAnswer(btn, correctAnswer, c, dir));
    optionsEl.appendChild(btn);
  }

  // Hide feedback & next
  document.getElementById('mc-feedback').classList.remove('show');
  document.getElementById('mc-next').style.display = 'none';

  // Progress
  document.getElementById('sess-fill').style.width = (session.idx / session.cards.length * 100) + '%';
  document.getElementById('sess-counter').textContent = `${session.idx + 1} / ${session.cards.length}`;
  document.getElementById('sess-info').textContent = c.type === 'new' ? 'Nieuw' : c.type === 'test' ? 'Toets' : 'Herhaling';

  // Store current answer for keyboard
  session.currentCorrect = correctAnswer;
  session.currentCard = c;
  session.currentDir = dir;
  session.alsoCorrectSet = alsoCorrectSet;
}

function highlightSpelling(verb, tense, personIdx, form) {
  if (!verb.hl || !verb.hl[tense]) return form;
  const hlPersons = verb.hl[tense];
  if (!hlPersons.includes(personIdx)) return form;
  return '<span class="spelling-hl">' + form + '</span>';
}

function handleAnswer(btn, correctAnswer, card, dir) {
  if (session.answered) return;
  session.answered = true;

  const isCorrect = btn.dataset.correct === '1';
  const allBtns = document.querySelectorAll('.mc-opt');

  allBtns.forEach(b => {
    b.classList.add('disabled');
    if (b.dataset.correct === '1') b.classList.add('reveal-correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    session.good++;
    if (!session.isBlockTest) applyGrade(card.key, 2, card.type === 'review');
    setTimeout(nextCard, 600);
  } else {
    btn.classList.add('wrong');
    session.bad++;
    if (!session.isBlockTest) applyGrade(card.key, 0, card.type === 'review');
    const fb = document.getElementById('mc-feedback');
    const fbTitle = document.getElementById('mc-fb-title');
    const fbRule = document.getElementById('mc-fb-rule');
    const also = session.alsoCorrectSet && session.alsoCorrectSet.size > 0
      ? ' / ' + Array.from(session.alsoCorrectSet).join(' / ')
      : '';
    fbTitle.textContent = 'Fout — ' + correctAnswer + also;
    fbTitle.className = 'mc-feedback-title fail';
    fbRule.textContent = getVerbRuleText(card.verb, card.tense);
    fb.classList.add('show');
    document.getElementById('mc-next').style.display = 'block';
  }
}

function nextCard() {
  if (!session) return;
  session.idx++;
  renderMCCard();
}

function finishSession() {
  const totalAns = session.good + session.bad;
  if (totalAns > 0) {
    state.sessionStats.recentRatios.push(session.good / totalAns);
    if (state.sessionStats.recentRatios.length > 10)
      state.sessionStats.recentRatios = state.sessionStats.recentRatios.slice(-10);
  }
  state.lastSessionEnded = Date.now();
  saveState();

  if (session.isBlockTest) {
    const ratio = totalAns > 0 ? session.good / totalAns : 0;
    const bi = state.progress.currentBlock;
    if (ratio >= BLOCK_TEST_PASS_PCT) {
      state.progress.blockTestPassed[bi] = true;
      if (bi < TOTAL_BLOCKS - 1) {
        state.progress.currentBlock = bi + 1;
        state.progress.currentSub = 0;
      }
      saveState();
      showScreen('screen-celebration');
      document.getElementById('celeb-title').textContent = `${BLOCKS[bi].name} voltooid!`;
      document.getElementById('celeb-text').textContent =
        `Bravo! Je scoorde ${Math.round(ratio * 100)}%. Het volgende blok is ontgrendeld!`;
      launchConfetti(4000);
    } else {
      showScreen('screen-summary');
      document.getElementById('sum-title').textContent = 'Helaas, niet gehaald';
      document.getElementById('sum-quote').textContent =
        `Je scoorde ${Math.round(ratio * 100)}%. Je hebt 80% nodig. Oefen verder en probeer opnieuw!`;
      document.getElementById('sum-good').textContent = session.good;
      document.getElementById('sum-bad').textContent = session.bad;
      document.getElementById('sum-cards').textContent = totalAns;
    }
    session = null;
    return;
  }

  const completed = advanceIfComplete();
  if (completed) {
    if (completed.needsBlockTest) {
      session = null;
      const bi = completed.blockIdx;
      document.getElementById('bt-title').textContent = `Bloktoets: ${BLOCKS[bi].name}`;
      showScreen('screen-block-test');
      return;
    }
    if (completed.allDone) {
      showScreen('screen-celebration');
      document.getElementById('celeb-title').textContent = 'Alle werkwoorden voltooid!';
      document.getElementById('celeb-text').textContent =
        'Magnifique! Je beheerst alle blokken. Blijf herhalen om het vast te houden!';
      launchConfetti(5000);
      session = null;
      return;
    }
    if (completed.blockComplete) {
      showScreen('screen-celebration');
      document.getElementById('celeb-title').textContent = `${BLOCKS[completed.blockIdx].name} voltooid!`;
      document.getElementById('celeb-text').textContent = `Geweldig! Door naar: ${BLOCKS[state.progress.currentBlock].name}`;
      launchConfetti(4000);
      session = null;
      return;
    }
    if (completed.subComplete) {
      const block = BLOCKS[completed.blockIdx];
      showScreen('screen-celebration');
      document.getElementById('celeb-title').textContent = `${block.subs[completed.subIdx].name} voltooid!`;
      document.getElementById('celeb-text').textContent =
        `Mooi werk! Door naar: ${block.subs[state.progress.currentSub].name}`;
      launchConfetti(3000);
      session = null;
      return;
    }
  }

  showScreen('screen-summary');
  const ratio = totalAns > 0 ? session.good / totalAns : 0;
  let title = 'Bien fait!';
  if (ratio >= 0.95) { title = 'Magnifique!'; launchConfetti(3000); }
  else if (ratio >= 0.8) { title = 'Très bien!'; launchConfetti(2000); }
  else if (ratio >= 0.5) { title = 'Bien fait!'; }
  else { title = 'Continue!'; }

  document.getElementById('sum-title').textContent = title;
  document.getElementById('sum-quote').textContent = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  document.getElementById('sum-good').textContent = session.good;
  document.getElementById('sum-bad').textContent = session.bad;
  document.getElementById('sum-cards').textContent = totalAns;
  session = null;
}

function abortSession() {
  if (!confirm('Sessie afbreken? Voortgang van geoefende kaarten blijft staan.')) return;
  session = null;
  renderHome();
  showScreen('screen-home');
}

// ============================================================
//   TENSE INFO SCREEN
// ============================================================
function getVerbTenseRule(verb, tense) {
  const t = verb.type;
  const inf = verb.inf;
  const forms = verb.conj[tense];
  if (t === 'auxiliary' || t === 'irregular' || t === 'impersonal') {
    if (!forms) return null;
    return { rule: `${inf} — onregelmatig`, detail: 'Uit het hoofd leren.',
      endings: null, forms: forms, note: verb.note || null };
  }
  if (t === 'reflexive') {
    const base = inf.replace(/^se\s+/, '');
    if (!forms) return null;
    return { rule: `Wederkerend: se + ${base}`, detail: `Voornaamwoord past zich aan: me, te, se, nous, vous, se.`,
      endings: null, forms: forms, note: verb.note || null };
  }
  const RULES = {
    present: {
      'regular-er': { rule: `Présent -er: stam + uitgang`, detail: `stam = ${inf} − -er → ${inf.slice(0,-2)}-`, endings: ['-e','-es','-e','-ons','-ez','-ent'] },
      'regular-ir': { rule: `Présent -ir: stam + -iss- + uitgang`, detail: `stam = ${inf} − -ir → ${inf.slice(0,-2)}-`, endings: ['-is','-is','-it','-issons','-issez','-issent'] },
      'regular-re': { rule: `Présent -re: stam + uitgang`, detail: `stam = ${inf} − -re → ${inf.slice(0,-2)}-`, endings: ['-s','-s','—','-ons','-ez','-ent'] },
    },
    imparfait: {
      _default: { rule: `Imparfait: nous-stam présent + uitgang`, detail: `${inf} → nous-vorm minus -ons + uitgang`, endings: ['-ais','-ais','-ait','-ions','-iez','-aient'] },
    },
    futur: {
      'regular-er': { rule: `Futur simple: infinitief + uitgang`, detail: `${inf} + uitgang`, endings: ['-ai','-as','-a','-ons','-ez','-ont'] },
      'regular-ir': { rule: `Futur simple: infinitief + uitgang`, detail: `${inf} + uitgang`, endings: ['-ai','-as','-a','-ons','-ez','-ont'] },
      'regular-re': { rule: `Futur simple: infinitief − e + uitgang`, detail: `${inf.slice(0,-1)} + uitgang`, endings: ['-ai','-as','-a','-ons','-ez','-ont'] },
    },
    conditionnel: {
      _default: { rule: `Conditionnel: futur-stam + imparfait-uitgangen`, detail: `${inf}${t === 'regular-re' ? ' (minus -e)' : ''} + uitgang`, endings: ['-ais','-ais','-ait','-ions','-iez','-aient'] },
    },
    subjonctif: {
      _default: { rule: `Subjonctif: ils-stam présent + uitgang`, detail: `ils-vorm minus -ent + uitgang`, endings: ['-e','-es','-e','-ions','-iez','-ent'] },
    },
    passeCompose: {
      _default: { rule: `Passé composé: ${verb.aux} (présent) + voltooid deelwoord`, detail: `deelwoord: ${verb.pp}${verb.aux === 'être' ? ' (past aan: +e/+s)' : ''}`, endings: null },
    },
    imperatif: {
      _default: { rule: `Impératif: présent-vorm zonder onderwerp`, detail: t === 'regular-er' ? `Bij -er: tu-vorm verliest de -s` : `tu / nous / vous`, endings: null },
    },
    futProche: {
      _default: { rule: `Futur proche: aller (présent) + infinitief`, detail: `vais/vas/va/allons/allez/vont + ${inf}`, endings: null },
    },
    passeSimple: {
      'regular-er': { rule: `Passé simple -er: stam + uitgang`, detail: `${inf.slice(0,-2)}- + uitgang`, endings: ['-ai','-as','-a','-âmes','-âtes','-èrent'] },
      'regular-ir': { rule: `Passé simple -ir: stam + uitgang`, detail: `${inf.slice(0,-2)}- + uitgang`, endings: ['-is','-is','-it','-îmes','-îtes','-irent'] },
      'regular-re': { rule: `Passé simple -re: stam + uitgang`, detail: `${inf.slice(0,-2)}- + uitgang`, endings: ['-is','-is','-it','-îmes','-îtes','-irent'] },
    },
    partPresent: {
      _default: { rule: `Participe présent: nous-stam + -ant`, detail: `${verb.ppres || ''}`, endings: null },
    },
  };
  const tenseRules = RULES[tense];
  if (!tenseRules) return null;
  if (t === 'spelling') {
    const base = tenseRules['regular-er'] || tenseRules['_default'];
    if (!base) return null;
    return { ...base, note: verb.note || null, forms: null,
      detail: (base.detail ? base.detail + '. ' : '') + (verb.note || '') };
  }
  const r = tenseRules[t] || tenseRules['_default'];
  if (!r) return null;
  const result = { ...r, note: verb.note || null, forms: null };
  return result;
}

function getVerbRuleText(verb, tense) {
  const info = getVerbTenseRule(verb, tense);
  if (!info) return '';
  if (verb.type === 'spelling' && verb.note) return info.rule + ' — ' + verb.note;
  return info.rule;
}

function renderTenseInfoHTML(verb, tense) {
  const baseInfo = TENSE_INFO[tense];
  const verbInfo = getVerbTenseRule(verb, tense);
  if (!baseInfo && !verbInfo) return '';
  const title = baseInfo ? baseInfo.title : getTenseLabel(tense);
  const usage = baseInfo ? baseInfo.usage : '';
  let ruleHTML = '';
  if (verbInfo) {
    let tableHTML = '';
    if (verbInfo.endings) {
      tableHTML = `<table class="conj-table">
        ${verbInfo.endings.map((e,i) => `<tr><td class="conj-person">${PERSONS[i]}</td><td class="conj-ending">${e}</td></tr>`).join('')}
      </table>`;
    } else if (verbInfo.forms) {
      tableHTML = `<table class="conj-table">
        ${verbInfo.forms.map((f,i) => f !== null ? `<tr><td class="conj-person">${PERSONS[i]}</td><td class="conj-ending">${f}</td></tr>` : '').join('')}
      </table>`;
    }
    ruleHTML = `<div class="rule-box">
      <div class="rule-title">Vormingsregel — ${verb.inf}</div>
      <div class="rule-text">${verbInfo.rule}</div>
      ${verbInfo.detail ? `<div class="rule-detail">${verbInfo.detail}</div>` : ''}
      ${tableHTML}
      ${verbInfo.note ? `<div class="rule-note">${verbInfo.note}</div>` : ''}
    </div>`;
  }
  const ex = verb.examples && verb.examples[tense];
  const exHTML = ex ? `<div class="example-box">
    <div class="example-fr">${ex.fr}</div>
    <div class="example-nl">${ex.nl}</div>
  </div>` : (baseInfo && baseInfo.example ? `<div class="example-box">
    <div class="example-fr">${baseInfo.example.fr}</div>
    <div class="example-nl">${baseInfo.example.nl}</div>
  </div>` : '');
  return `<h2>${title} — ${verb.inf}</h2>
    <div class="usage">${usage}</div>
    ${ruleHTML}
    ${exHTML}`;
}

function showTenseInfoForVerb(verb, tense) {
  const el = document.getElementById('tense-info-content');
  el.innerHTML = renderTenseInfoHTML(verb, tense);
  showScreen('screen-tense-info');
}

function showTenseInfoForBlock(blockIdx) {
  const block = BLOCKS[blockIdx];
  if (!block) return;
  const el = document.getElementById('tense-info-content');
  const tenses = block.tenses || ['present'];
  const seenTypes = new Set();
  let html = `<h2>${block.name}</h2><div class="usage">Overzicht van de grammatica in dit blok.</div>`;
  for (const sub of block.subs) {
    for (const verbInf of sub.verbs) {
      const verb = getVerbByInf(verbInf);
      if (!verb) continue;
      const typeKey = verb.type + '|' + tenses[0];
      if (seenTypes.has(typeKey)) continue;
      seenTypes.add(typeKey);
      for (const tense of tenses) {
        const verbInfo = getVerbTenseRule(verb, tense);
        if (!verbInfo) continue;
        let tableHTML = '';
        if (verbInfo.endings) {
          tableHTML = `<table class="conj-table">
            ${verbInfo.endings.map((e,i) => `<tr><td class="conj-person">${PERSONS[i]}</td><td class="conj-ending">${e}</td></tr>`).join('')}
          </table>`;
        } else if (verbInfo.forms) {
          tableHTML = `<table class="conj-table">
            ${verbInfo.forms.map((f,i) => f !== null ? `<tr><td class="conj-person">${PERSONS[i]}</td><td class="conj-ending">${f}</td></tr>` : '').join('')}
          </table>`;
        }
        html += `<div class="rule-box" style="margin-bottom:12px">
          <div class="rule-title">Vormingsregel — ${verb.inf}</div>
          <div class="rule-text">${verbInfo.rule}</div>
          ${verbInfo.detail ? `<div class="rule-detail">${verbInfo.detail}</div>` : ''}
          ${tableHTML}
          ${verbInfo.note ? `<div class="rule-note">${verbInfo.note}</div>` : ''}
        </div>`;
      }
    }
  }
  el.innerHTML = html;
  showScreen('screen-tense-info');
}

// ============================================================
//   CONFETTI
// ============================================================
function launchConfetti(duration) {
  duration = duration || 3000;
  const canvas = document.createElement('canvas');
  canvas.className = 'confetti-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#ff3b30','#af52de','#34c759','#ff9500','#5b8aff','#ffcc00','#6dd58c'];
  const particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * -0.5 - 20,
      w: 6 + Math.random() * 6, h: 4 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4,
      rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 12, opacity: 1
    });
  }
  const start = Date.now();
  function frame() {
    const elapsed = Date.now() - start;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const fadeStart = duration * 0.7;
    for (const p of particles) {
      p.x += p.vx; p.vy += 0.08; p.y += p.vy; p.rot += p.rotV;
      if (elapsed > fadeStart) p.opacity = Math.max(0, 1 - (elapsed - fadeStart) / (duration - fadeStart));
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
    }
    if (elapsed < duration) requestAnimationFrame(frame);
    else canvas.remove();
  }
  requestAnimationFrame(frame);
}

// ============================================================
//   EVENT HANDLERS
// ============================================================
document.addEventListener('click', (e) => {
  const action = e.target.closest('[data-action]');
  if (!action) return;
  const a = action.dataset.action;

  switch (a) {
    case 'start':
      startSession(false);
      break;
    case 'start-block-test':
      startSession(true);
      break;
    case 'next-card':
      nextCard();
      break;
    case 'abort-session':
      abortSession();
      break;
    case 'back-home':
    case 'continue-from-celeb':
      renderHome();
      showScreen('screen-home');
      break;
    case 'open-settings':
      showScreen('screen-settings');
      break;
    case 'show-tense-info': {
      if (session && session.cards && session.cards[session.idx]) {
        const c = session.cards[session.idx];
        showTenseInfoForVerb(c.verb, c.tense);
      } else {
        showTenseInfoForBlock(state.progress.currentBlock);
      }
      break;
    }
    case 'close-tense-info':
      if (session) showScreen('screen-session');
      else { renderHome(); showScreen('screen-home'); }
      break;
    case 'export':
      exportState();
      break;
    case 'import':
      document.getElementById('import-file').click();
      break;
    case 'reset':
      if (confirm('Weet je zeker dat je ALLE voortgang wilt wissen? Dit kan niet ongedaan worden.')) {
        localStorage.removeItem(STORAGE_KEY);
        state = defaultState();
        saveState();
        renderHome();
        showScreen('screen-home');
        toast('Voortgang gewist');
      }
      break;
  }
});

document.getElementById('import-file').addEventListener('change', (e) => {
  if (e.target.files[0]) importState(e.target.files[0]);
  e.target.value = '';
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('screen-session').classList.contains('active')) return;
  if (!session) return;
  if (session.answered) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); nextCard(); }
    return;
  }
  if (e.key >= '1' && e.key <= '4') {
    const btns = document.querySelectorAll('.mc-opt');
    const idx = parseInt(e.key) - 1;
    if (btns[idx]) btns[idx].click();
  }
});

// ============================================================
//   INIT
// ============================================================
loadState();
renderHome();

</script>
